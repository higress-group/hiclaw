apiVersion: v1
kind: Secret
metadata:
  name: hiclaw-secrets
  namespace: hiclaw
type: Opaque
stringData:
  # LLM API Key (必填)
  LLM_API_KEY: "your-api-key-here"
  
  # 管理员凭据 (必填)
  ADMIN_USER: "admin"
  ADMIN_PASSWORD: "change-me-secure-password"
  
  # MinIO 凭据
  MINIO_USER: "minioadmin"
  MINIO_PASSWORD: "minioadmin"
  
  # Manager Gateway Key (自动生成或手动设置)
  MANAGER_GATEWAY_KEY: "hiclaw-manager-key-change-me"
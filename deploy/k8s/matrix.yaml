# Matrix (Tuwunel) - IM 服务器
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tuwunel
  namespace: hiclaw
  labels:
    app.kubernetes.io/name: tuwunel
    app.kubernetes.io/component: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tuwunel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tuwunel
    spec:
      containers:
      - name: tuwunel
        image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/tuwunel:20260216
        ports:
        - containerPort: 6167
          name: matrix
        - containerPort: 8080
          name: well-known
        env:
        - name: SERVER_NAME
          value: "matrix-local.hiclaw.io:8080"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /_matrix/client/versions
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_matrix/client/versions
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tuwunel
  namespace: hiclaw
  labels:
    app.kubernetes.io/name: tuwunel
spec:
  ports:
  - port: 6167
    name: matrix
  - port: 8080
    name: well-known
  selector:
    app.kubernetes.io/name: tuwunel